<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Registration System</title>
</head>
<body>
    <h1>Welcome to the Class Registration System</h1>
    <form action="#" method="post">
        <label for="class">Select a Class:</label>
        <select id="class" name="class">
            <option value="math">Math 101</option>
            <option value="science">Science 101</option>
            <option value="history">History 101</option>
        </select>
        <br>
        <input type="submit" value="Register">
    </form>
</body>
</html>
